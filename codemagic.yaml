# Codemagic CI/CD Configuration for Tutormeter
# Documentation: https://docs.codemagic.io/yaml/yaml/

workflows:

  # ──────────────────────────────────────────
  # App Store / TestFlight Release (manual trigger, no tag)
  # ──────────────────────────────────────────
  ios-appstore:
    name: iOS App Store Release
    instance_type: mac_mini_m2
    max_build_duration: 90
    environment:
      groups:
        - appstore
        - ios_signing
      xcode: "16.0"
      vars:
        XCODE_PROJECT: Tutormeter.xcodeproj
        XCODE_SCHEME: Tutormeter
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen
      - name: Generate Xcode project
        script: xcodegen generate --spec project.yml
      - name: Run unit tests
        script: |
          xcodebuild test -project $XCODE_PROJECT -scheme $XCODE_SCHEME \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
      - name: Set up signing (keychain + profile)
        script: |
          echo "=== Setting up keychain ==="
          security create-keychain -p "" build.keychain 2>/dev/null || true
          security default-keychain -s build.keychain 2>/dev/null || true
          security unlock-keychain -p "" build.keychain 2>/dev/null || true
          echo "$CM_CERTIFICATE" | base64 --decode > /tmp/cert.p12 2>/dev/null || echo "$CM_CERTIFICATE" | base64 -D > /tmp/cert.p12
          security import /tmp/cert.p12 -k build.keychain -P "$CM_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security 2>/dev/null || true
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain 2>/dev/null || true
          echo "=== Installing provisioning profile ==="
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/d0215d26-1fda-4901-8a6f-7b1924fb10fd.mobileprovision 2>/dev/null
          echo "$CM_PROVISIONING_PROFILE" | base64 -D > ~/Library/MobileDevice/Provisioning\ Profiles/d0215d26-1fda-4901-8a6f-7b1924fb10fd.mobileprovision 2>/dev/null || true
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/
          echo "=== Available identities ==="
          security find-identity -v -p codesigning build.keychain 2>/dev/null || true
      - name: Build signed archive
        script: |
          xcodebuild archive -project $XCODE_PROJECT -scheme $XCODE_SCHEME \
            -archivePath build/ios/archive/Tutormeter.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution: GIANMARCO BLASI (RW4U7HX5AH)" \
            PROVISIONING_PROFILE_SPECIFIER="d0215d26-1fda-4901-8a6f-7b1924fb10fd"
    artifacts:
      - build/ios/archive/Tutormeter.xcarchive
      - TestResults.xcresult
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - Tutormeter Internal Testers
        submit_to_app_store: false

  # ──────────────────────────────────────────
  # Development Build (on push to dev/main)
  # ──────────────────────────────────────────
  ios-dev-build:
    name: iOS Dev Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: "16.0"
      vars:
        XCODE_PROJECT: Tutormeter.xcodeproj
        XCODE_SCHEME: Tutormeter
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
        - pattern: develop
        - pattern: 'feature/*'
      cancel_previous_builds: true
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen
      - name: Generate Xcode project
        script: xcodegen generate --spec project.yml
      - name: Run unit tests
        script: |
          xcodebuild test -project $XCODE_PROJECT -scheme $XCODE_SCHEME \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
      - name: Build archive (no signing)
        script: |
          xcodebuild archive -project $XCODE_PROJECT -scheme $XCODE_SCHEME \
            -archivePath build/ios/archive/Tutormeter.xcarchive \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
    artifacts:
      - build/ios/archive/Tutormeter.xcarchive
      - TestResults.xcresult
      - $HOME/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult

  # ──────────────────────────────────────────
  # Pull Request Validation (PR checks only)
  # ──────────────────────────────────────────
  # TestFlight Release (on tag 'release/*')
  # ──────────────────────────────────────────
  ios-testflight:
    name: iOS TestFlight Release
    instance_type: mac_mini_m2
    max_build_duration: 90
    environment:
      groups:
        - appstore
        - ios_signing
      xcode: "16.0"
      vars:
        XCODE_PROJECT: Tutormeter.xcodeproj
        XCODE_SCHEME: Tutormeter
        PROVISIONING_PROFILE_UUID: d0215d26-1fda-4901-8a6f-7b1924fb10fd
        CODE_SIGN_IDENTITY_NAME: "iPhone Distribution: GIANMARCO BLASI (RW4U7HX5AH)"
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'release/*'
        - pattern: 'beta/*'
      cancel_previous_builds: false
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          xcodegen generate --spec project.yml
      - name: Set build number from Codemagic
        script: |
          agvtool new-version -all $PROJECT_BUILD_NUMBER
      - name: Run unit tests
        script: |
          xcodebuild test \
            -project $XCODE_PROJECT \
            -scheme $XCODE_SCHEME \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="" \
             CODE_SIGNING_REQUIRED=NO \
             CODE_SIGNING_ALLOWED=NO
      - name: Diagnostic - check what xcodebuild sees
        script: |
          echo "=== Xcode version ===" && xcodebuild -version
          echo "=== Project settings ===" && xcodebuild -project $XCODE_PROJECT -scheme $XCODE_SCHEME -showBuildSettings 2>/dev/null | grep -iE "PROVISIONING|SIGNING|BUNDLE|TEAM" | head -20 || true
          echo "=== Available profiles ===" && ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null || echo "No profiles dir"
          echo "=== Profile details ===" && for f in ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision; do echo "--- $f ---"; /usr/libexec/PlistBuddy -c Print "$f" 2>/dev/null | grep -A1 -E "application-identifier|Name|UUID|ExpirationDate|Platform" || true; done
      - name: Build unsigned archive
        script: |
          xcodebuild archive \
            -project $XCODE_PROJECT \
            -scheme $XCODE_SCHEME \
            -archivePath build/ios/archive/Tutormeter.xcarchive \
            CODE_SIGN_IDENTITY="" \
             CODE_SIGNING_REQUIRED=NO \
             CODE_SIGNING_ALLOWED=NO
    artifacts:
      - build/ios/archive/Tutormeter.xcarchive
      - TestResults.xcresult

  # ──────────────────────────────────────────
  # Pull Request Validation (PR checks only)
  # ──────────────────────────────────────────
  ios-pr-check:
    name: iOS PR Check
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      xcode: "16.0"
      vars:
        XCODE_PROJECT: Tutormeter.xcodeproj
        XCODE_SCHEME: Tutormeter
    triggering:
      events:
        - pull_request
      cancel_previous_builds: true
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          xcodegen generate --spec project.yml
      - name: Run unit tests
        script: |
          xcodebuild test \
            -project $XCODE_PROJECT \
            -scheme $XCODE_SCHEME \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Check for warnings
        script: |
          xcodebuild clean build \
            -project $XCODE_PROJECT \
            -scheme $XCODE_SCHEME \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES 2>&1 | tee build.log
          echo "Build completed with warnings treated as errors"
