# Codemagic CI/CD Configuration for Tutormeter
# Documentation: https://docs.codemagic.io/yaml/yaml/

workflows:

  # ──────────────────────────────────────────
  # App Store / TestFlight Release (manual trigger, no tag)
  # ──────────────────────────────────────────
  ios-appstore:
    name: iOS App Store Release
    instance_type: mac_mini_m2
    max_build_duration: 90
    environment:
      groups:
        - appstore
        - ios_signing
      xcode: "16.0"
      vars:
        XCODE_PROJECT: Tutormeter.xcodeproj
        XCODE_SCHEME: Tutormeter
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen
      - name: Generate Xcode project
        script: xcodegen generate --spec project.yml
      - name: Run unit tests
        script: |
          xcodebuild test -project $XCODE_PROJECT -scheme $XCODE_SCHEME \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
      - name: Set up signing (keychain + cert + profile)
        script: |
          echo "=== Keychain setup ==="
          security create-keychain -p "temporary" build.keychain 2>/dev/null || true
          security default-keychain -s build.keychain
          security unlock-keychain -p "temporary" build.keychain

          echo "=== Convert XML key to PEM ==="
          printenv CM_PRIVATE_KEY_B64 | base64 --decode > /tmp/key.xml 2>/dev/null
          printenv CM_PRIVATE_KEY_B64 | base64 -D > /tmp/key.xml 2>/dev/null || true
          python3 -c "
          import re, base64
          with open('/tmp/key.xml') as f: xml = f.read()
          def get(tag): return base64.b64decode(re.search(f'<{tag}>(.*?)</{tag}>', xml).group(1))
          n, e, d, p, q = get('Modulus'), get('Exponent'), get('D'), get('P'), get('Q')
          dp, dq, iq = get('DP'), get('DQ'), get('InverseQ')
          n_int = int.from_bytes(n, 'big'); e_int = int.from_bytes(e, 'big')
          d_int = int.from_bytes(d, 'big'); p_int = int.from_bytes(p, 'big'); q_int = int.from_bytes(q, 'big')
          dp_int = int.from_bytes(dp, 'big'); dq_int = int.from_bytes(dq, 'big'); iq_int = int.from_bytes(iq, 'big')
          from cryptography.hazmat.primitives.asymmetric import rsa
          from cryptography.hazmat.primitives import serialization
          key = rsa.RSAPrivateNumbers(p=p_int, q=q_int, d=d_int, dmp1=dp_int, dmq1=dq_int, iqmp=iq_int,
              public_numbers=rsa.RSAPublicNumbers(e=e_int, n=n_int)).private_key()
          pem = key.private_bytes(encoding=serialization.Encoding.PEM, format=serialization.PrivateFormat.PKCS8,
              encryption_algorithm=serialization.NoEncryption())
          with open('/tmp/key.pem', 'wb') as f: f.write(pem)
          print(f'PEM key: {len(pem)} bytes')
          "

          if [ -f /tmp/key.pem ]; then
            echo "=== Create p12 from cert + key ==="
            printenv CM_DIST_CERT | base64 --decode > /tmp/cert.cer 2>/dev/null
            printenv CM_DIST_CERT | base64 -D > /tmp/cert.cer 2>/dev/null || true
            openssl pkcs12 -export -out /tmp/proper.p12 -inkey /tmp/key.pem -in /tmp/cert.cer -legacy -passout pass:Tutormeter2026!
            ls -la /tmp/proper.p12
            echo "=== Import into keychain ==="
            security import /tmp/proper.p12 -k build.keychain -P Tutormeter2026! -A -T /usr/bin/codesign
          else
            echo "ERROR: Could not create PEM key"
            exit 1
          fi

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "temporary" build.keychain 2>/dev/null || true

          echo "=== Install provisioning profile ==="
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          printenv CM_PROVISIONING_PROFILE | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/d0215d26-1fda-4901-8a6f-7b1924fb10fd.mobileprovision 2>/dev/null
          printenv CM_PROVISIONING_PROFILE | base64 -D > ~/Library/MobileDevice/Provisioning\ Profiles/d0215d26-1fda-4901-8a6f-7b1924fb10fd.mobileprovision 2>/dev/null || true
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/
          echo "=== Identities ==="
          security find-identity -v -p codesigning build.keychain
      - name: Build signed archive
        script: |
          xcodebuild archive -project $XCODE_PROJECT -scheme $XCODE_SCHEME \
            -archivePath build/ios/archive/Tutormeter.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution: GIANMARCO BLASI (RW4U7HX5AH)" \
             PROVISIONING_PROFILE_SPECIFIER="d0215d26-1fda-4901-8a6f-7b1924fb10fd"
      - name: Export IPA + Upload to TestFlight
        script: |
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/authkey.p8
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Tutormeter.xcarchive \
            -exportPath build/ios/ipa \
            -allowProvisioningUpdates \
            -authenticationKeyIssuerID $APP_STORE_CONNECT_ISSUER_ID \
            -authenticationKeyID $APP_STORE_CONNECT_KEY_ID \
            -authenticationKeyPath /tmp/authkey.p8
          IPA=$(find build/ios/ipa -name "*.ipa" | head -1)
          echo "IPA: $IPA"
          xcrun altool --upload-app -f "$IPA" -t ios \
            --apiKey $APP_STORE_CONNECT_KEY_ID \
            --apiIssuer $APP_STORE_CONNECT_ISSUER_ID \
            --apiKeyFile /tmp/authkey.p8 \
            --verbose
    artifacts:
      - build/ios/ipa/Tutormeter.ipa
      - build/ios/archive/Tutormeter.xcarchive
      - TestResults.xcresult

  # ──────────────────────────────────────────
  # Development Build (on push to dev/main)
  # ──────────────────────────────────────────
  ios-dev-build:
    name: iOS Dev Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: "16.0"
      vars:
        XCODE_PROJECT: Tutormeter.xcodeproj
        XCODE_SCHEME: Tutormeter
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
        - pattern: develop
        - pattern: 'feature/*'
      cancel_previous_builds: true
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen
      - name: Generate Xcode project
        script: xcodegen generate --spec project.yml
      - name: Run unit tests
        script: |
          xcodebuild test -project $XCODE_PROJECT -scheme $XCODE_SCHEME \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
      - name: Build archive (no signing)
        script: |
          xcodebuild archive -project $XCODE_PROJECT -scheme $XCODE_SCHEME \
            -archivePath build/ios/archive/Tutormeter.xcarchive \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
    artifacts:
      - build/ios/archive/Tutormeter.xcarchive
      - TestResults.xcresult
      - $HOME/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult

  # ──────────────────────────────────────────
  # Pull Request Validation (PR checks only)
  # ──────────────────────────────────────────
  # TestFlight Release (on tag 'release/*')
  # ──────────────────────────────────────────
  ios-testflight:
    name: iOS TestFlight Release
    instance_type: mac_mini_m2
    max_build_duration: 90
    environment:
      groups:
        - appstore
        - ios_signing
      xcode: "16.0"
      vars:
        XCODE_PROJECT: Tutormeter.xcodeproj
        XCODE_SCHEME: Tutormeter
        PROVISIONING_PROFILE_UUID: d0215d26-1fda-4901-8a6f-7b1924fb10fd
        CODE_SIGN_IDENTITY_NAME: "iPhone Distribution: GIANMARCO BLASI (RW4U7HX5AH)"
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'release/*'
        - pattern: 'beta/*'
      cancel_previous_builds: false
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          xcodegen generate --spec project.yml
      - name: Set build number from Codemagic
        script: |
          agvtool new-version -all $PROJECT_BUILD_NUMBER
      - name: Run unit tests
        script: |
          xcodebuild test \
            -project $XCODE_PROJECT \
            -scheme $XCODE_SCHEME \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="" \
             CODE_SIGNING_REQUIRED=NO \
             CODE_SIGNING_ALLOWED=NO
      - name: Diagnostic - check what xcodebuild sees
        script: |
          echo "=== Xcode version ===" && xcodebuild -version
          echo "=== Project settings ===" && xcodebuild -project $XCODE_PROJECT -scheme $XCODE_SCHEME -showBuildSettings 2>/dev/null | grep -iE "PROVISIONING|SIGNING|BUNDLE|TEAM" | head -20 || true
          echo "=== Available profiles ===" && ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null || echo "No profiles dir"
          echo "=== Profile details ===" && for f in ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision; do echo "--- $f ---"; /usr/libexec/PlistBuddy -c Print "$f" 2>/dev/null | grep -A1 -E "application-identifier|Name|UUID|ExpirationDate|Platform" || true; done
      - name: Build unsigned archive
        script: |
          xcodebuild archive \
            -project $XCODE_PROJECT \
            -scheme $XCODE_SCHEME \
            -archivePath build/ios/archive/Tutormeter.xcarchive \
            CODE_SIGN_IDENTITY="" \
             CODE_SIGNING_REQUIRED=NO \
             CODE_SIGNING_ALLOWED=NO
    artifacts:
      - build/ios/archive/Tutormeter.xcarchive
      - TestResults.xcresult

  # ──────────────────────────────────────────
  # Pull Request Validation (PR checks only)
  # ──────────────────────────────────────────
  ios-pr-check:
    name: iOS PR Check
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      xcode: "16.0"
      vars:
        XCODE_PROJECT: Tutormeter.xcodeproj
        XCODE_SCHEME: Tutormeter
    triggering:
      events:
        - pull_request
      cancel_previous_builds: true
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          xcodegen generate --spec project.yml
      - name: Run unit tests
        script: |
          xcodebuild test \
            -project $XCODE_PROJECT \
            -scheme $XCODE_SCHEME \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Check for warnings
        script: |
          xcodebuild clean build \
            -project $XCODE_PROJECT \
            -scheme $XCODE_SCHEME \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES 2>&1 | tee build.log
          echo "Build completed with warnings treated as errors"
