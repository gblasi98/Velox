# Codemagic CI/CD Configuration for Tutormeter
# Documentation: https://docs.codemagic.io/yaml/yaml/

workflows:

  # ──────────────────────────────────────────
  # Development Build (on push to dev/main)
  # ──────────────────────────────────────────
  ios-dev-build:
    name: iOS Dev Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: "16.0"
      vars:
        XCODE_PROJECT: Tutormeter.xcodeproj
        XCODE_SCHEME: Tutormeter
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
        - pattern: develop
        - pattern: 'feature/*'
      cancel_previous_builds: true
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          xcodegen generate --spec project.yml
      - name: Run unit tests
        script: |
          xcodebuild test \
            -project $XCODE_PROJECT \
            -scheme $XCODE_SCHEME \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Build archive (no signing)
        script: |
          xcodebuild archive \
            -project $XCODE_PROJECT \
            -scheme $XCODE_SCHEME \
            -archivePath build/ios/archive/Tutormeter.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - build/ios/archive/Tutormeter.xcarchive
      - TestResults.xcresult
      - $HOME/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult

  # ──────────────────────────────────────────
  # TestFlight Release (on tag 'release/*')
  # ──────────────────────────────────────────
  ios-testflight:
    name: iOS TestFlight Release
    instance_type: mac_mini_m2
    max_build_duration: 90
    environment:
      groups:
        - appstore
        - ios_signing
      xcode: "16.0"
      vars:
        XCODE_PROJECT: Tutormeter.xcodeproj
        XCODE_SCHEME: Tutormeter
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'release/*'
        - pattern: 'beta/*'
      cancel_previous_builds: false
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          xcodegen generate --spec project.yml
      - name: Set build number from Codemagic
        script: |
          agvtool new-version -all $PROJECT_BUILD_NUMBER
      - name: Run unit tests
        script: |
          xcodebuild test \
            -project $XCODE_PROJECT \
            -scheme $XCODE_SCHEME \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -resultBundlePath TestResults.xcresult \
             CODE_SIGN_IDENTITY="" \
             CODE_SIGNING_REQUIRED=NO \
             CODE_SIGNING_ALLOWED=NO
      - name: Create provisioning profile (Ruby + App Store Connect API)
        script: |
          gem install jwt -q --no-document 2>/dev/null
          ruby -r jwt -r json -r net/http -r openssl -e '
          BUNDLE = "com.tutormeter.app"
          KEY_ID = ENV["APP_STORE_CONNECT_KEY_ID"]
          ISSUER = ENV["APP_STORE_CONNECT_ISSUER_ID"]
          KEY = ENV["APP_STORE_CONNECT_PRIVATE_KEY"]

          def jwt
            payload = { iss: ISSUER, iat: Time.now.to_i, exp: Time.now.to_i + 600, aud: "appstoreconnect-v1" }
            headers = { kid: KEY_ID, typ: "JWT" }
            private_key = OpenSSL::PKey::EC.new(KEY)
            JWT.encode(payload, private_key, "ES256", headers)
          end

          def api(path, method=:Get, body=nil)
            uri = URI("https://api.appstoreconnect.apple.com/v1#{path}")
            http = Net::HTTP.new(uri.host, uri.port)
            http.use_ssl = true
            req = case method
                  when :Get then Net::HTTP::Get.new(uri)
                  when :Post then Net::HTTP::Post.new(uri)
                  end
            req["Authorization"] = "Bearer #{jwt}"
            req["Content-Type"] = "application/json"
            req.body = body.to_json if body
            JSON.parse(http.request(req).body)
          end

          # Get bundle ID
          r = api("/bundleIds?filter[identifier]=#{BUNDLE}")
          bid = r.dig("data", 0, "id")
          puts "Bundle: #{bid || "NOT FOUND"}"

          # Get distribution cert
          r = api("/certificates?filter[certificateType]=IOS_DISTRIBUTION&limit=1")
          cid = r.dig("data", 0, "id")
          puts "Cert: #{cid || "NOT FOUND"}"

          # Check/create profile
          r = api("/profiles?filter[name]=Tutormeter%20CI&filter[profileType]=IOS_APP_STORE")
          pid = r.dig("data", 0, "id")

          if pid
            puts "Profile exists: #{pid}"
          elsif bid && cid
            body = { data: { type: "profiles", attributes: { name: "Tutormeter CI", profileType: "IOS_APP_STORE" },
              relationships: { bundleId: { data: { type: "bundleIds", id: bid } },
                               certificates: { data: [{ type: "certificates", id: cid }] } } } }
            r = api("/profiles", :Post, body)
            pid = r.dig("data", "id")
            puts "Profile created: #{pid || "FAILED: #{r["errors"]&.inspect}"}"
          end

          # Download and install
          if pid
            r = api("/profiles/#{pid}")
            pc = r.dig("data", "attributes", "profileContent")
            pu = r.dig("data", "attributes", "uuid")
            if pc && pu
              dir = File.expand_path("~/Library/MobileDevice/Provisioning Profiles")
              Dir.mkdir(dir) unless Dir.exist?(dir)
              File.write("#{dir}/#{pu}.mobileprovision", Base64.decode64(pc))
              puts "Profile installed: #{pu}"
            end
          end
          '
      - name: Build and sign archive (App Store API key)
        script: |
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/authkey.p8
          xcodebuild archive \
            -project $XCODE_PROJECT \
            -scheme $XCODE_SCHEME \
            -archivePath build/ios/archive/Tutormeter.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyIssuerID $APP_STORE_CONNECT_ISSUER_ID \
            -authenticationKeyID $APP_STORE_CONNECT_KEY_ID \
            -authenticationKeyPath /tmp/authkey.p8
    artifacts:
      - build/ios/archive/Tutormeter.xcarchive
      - TestResults.xcresult
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - Tutormeter Internal Testers
        submit_to_app_store: false
        # App Store compliance:
        # - Encryption: No (no network transmission)
        # - IDFA: No (no ads or tracking)
      email:
        recipients:
          - CHANGE_ME@example.com  # ← Replace with your email
        notify:
          success: true
          failure: true

  # ──────────────────────────────────────────
  # Pull Request Validation (PR checks only)
  # ──────────────────────────────────────────
  ios-pr-check:
    name: iOS PR Check
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      xcode: "16.0"
      vars:
        XCODE_PROJECT: Tutormeter.xcodeproj
        XCODE_SCHEME: Tutormeter
    triggering:
      events:
        - pull_request
      cancel_previous_builds: true
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          xcodegen generate --spec project.yml
      - name: Run unit tests
        script: |
          xcodebuild test \
            -project $XCODE_PROJECT \
            -scheme $XCODE_SCHEME \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Check for warnings
        script: |
          xcodebuild clean build \
            -project $XCODE_PROJECT \
            -scheme $XCODE_SCHEME \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES 2>&1 | tee build.log
          echo "Build completed with warnings treated as errors"
