name: Tutormeter
options:
  bundleIdPrefix: com.tutormeter
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  postGenCommand: |
    echo "Xcode project generated successfully"

settings:
  base:
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "" # Set in codemagic.yaml via environment
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

targets:
  Tutormeter:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Velox
        type: group
    resources:
      - path: Resources
        type: group
    settings:
      base:
        INFOPLIST_FILE: Velox/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.tutormeter.app
        PRODUCT_NAME: Tutormeter
        SWIFT_OBJC_BRIDGING_HEADER: ""
        GENERATE_INFOPLIST_FILE: "NO"
    attributes:
      SystemCapabilities:
        com.apple.BackgroundModes:
          enabled: true
          modes:
            - location
            - audio
            - fetch
        com.apple.Push:
          enabled: true
        com.apple.developer.siri:
          enabled: true
        com.apple.developer.carplay-maps:
          enabled: false
        com.apple.developer.carplay-audio:
          enabled: false
        com.apple.developer.carplay-messaging:
          enabled: false
        com.apple.developer.playable-content:
          enabled: false
    info:
      path: Velox/App/Info.plist
      properties:
        CFBundleName: Tutormeter
        CFBundleDisplayName: Tutormeter
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        LSRequiresIPhoneOS: true
        UIApplicationSupportsIndirectInputEvents: true
        UIRequiredDeviceCapabilities:
          - arm64
          - accelerometer
          - gyroscope
          - gps
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - location
          - audio
          - fetch
        NSLocationWhenInUseUsageDescription: "Tutormeter uses your location to calculate average speed in speed camera zones."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Tutormeter needs background location access to track your speed while using navigation apps."
        NSMotionUsageDescription: "Tutormeter uses motion sensors to improve speed accuracy in tunnels and areas with poor GPS."
        NSSiriUsageDescription: "Tutormeter uses Siri to let you start tracking with a voice command."
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate

  TutormeterTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
        type: group
    settings:
      base:
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.tutormeter.app.tests
    dependencies:
      - target: Tutormeter

schemes:
  Tutormeter:
    build:
      targets:
        Tutormeter: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TutormeterTests
    archive:
      config: Release
