name: Velox
options:
  bundleIdPrefix: com.velox
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  postGenCommand: |
    echo "Xcode project generated successfully"

settings:
  base:
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "" # Set in codemagic.yaml via environment
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

packages:
  # No external SPM dependencies needed - all Apple frameworks

targets:
  Velox:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Velox
        type: group
    resources:
      - path: Resources
        type: group
    settings:
      base:
        INFOPLIST_FILE: Velox/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.velox.app
        PRODUCT_NAME: Velox
        SWIFT_OBJC_BRIDGING_HEADER: ""
        GENERATE_INFOPLIST_FILE: "NO"
    attributes:
      SystemCapabilities:
        com.apple.BackgroundModes:
          enabled: true
          modes:
            - location
            - audio
            - fetch
        com.apple.Push:
          enabled: true
        com.apple.developer.siri:
          enabled: true
        com.apple.developer.carplay-maps:
          enabled: false
        com.apple.developer.carplay-audio:
          enabled: false
    info:
      path: Velox/App/Info.plist
      properties:
        CFBundleName: Velox
        CFBundleDisplayName: Velox
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        LSRequiresIPhoneOS: true
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchStoryboardName: LaunchScreen
        UIRequiredDeviceCapabilities:
          - arm64
          - location-services
          - gps
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - location
          - audio
          - fetch
        NSLocationWhenInUseUsageDescription: "Velox uses your location to calculate average speed in speed camera zones."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Velox needs background location access to track your speed while using navigation apps."
        NSMotionUsageDescription: "Velox uses motion sensors to improve speed accuracy in tunnels and areas with poor GPS."
        NSSiriUsageDescription: "Velox uses Siri to let you start tracking with a voice command."
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false

  VeloxTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
        type: group
    settings:
      base:
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.velox.app.tests
    dependencies:
      - target: Velox

schemes:
  Velox:
    build:
      targets:
        Velox: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - VeloxTests
    archive:
      config: Release
